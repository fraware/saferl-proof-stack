name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Run static analysis
        run: |
          poetry run ruff check proofstack tests benchmarks
          poetry run mypy proofstack/errors.py proofstack/observability.py

      - name: Run tests with coverage
        run: |
          poetry run pytest tests --cov=proofstack --cov-report=xml --cov-report=term-missing

      - name: Run performance baseline checks
        run: |
          poetry run python -m pytest benchmarks -q

      - name: Run multi-algorithm tests
        run: |
          poetry run python test_multi_algo.py

      - name: Run CLI smoke tests
        run: |
          poetry run proofstack --help
          poetry run proofstack init test_env
          poetry run proofstack version

      - name: Test Lean proof checking
        run: |
          if command -v lake >/dev/null 2>&1; then
            poetry run lake build
          else
            echo "lake not installed in runner, skipping Lean build step"
          fi

      - name: Build documentation
        run: |
          poetry run mkdocs build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t saferl-proofstack .

      - name: Test Docker image
        run: |
          docker run --rm saferl-proofstack proofstack --help
          docker run --rm saferl-proofstack proofstack version

  end-to-end:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Run end-to-end smoke test
        run: |
          poetry run proofstack --help
          poetry run proofstack version
